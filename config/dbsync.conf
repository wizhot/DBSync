# DbSync Configuration File
# 管家婆 grasp.db ↔ SALES.FDB 实时同步

[node]
id = auto-generated-uuid

[local_database]
# 本地数据库：管家婆 grasp.db (SQLite加密)
database = data/grasp.db
db_type = sqlite
encryption_key =
charset = UTF8

[remote_database]
# 远程数据库：SALES.FDB (Firebird Embedded)
host = 192.168.1.100
database = data/SALES.FDB
db_type = firebird
username = SYSDBA
password = masterkey
charset = UTF8
embedded = true

[network]
local_ip = 0.0.0.0
local_port = 15555
remote_ip = 192.168.1.100
remote_port = 15555
connection_timeout_ms = 5000
retry_interval_ms = 3000

[sync]
auto_start = true
minimize_to_tray = true
start_with_windows = false
sync_interval_ms = 1000
max_retries = 3
resolve_conflicts_automatically = true
conflict_resolution_strategy = timestamp
mapping_file = config/mapping.json
